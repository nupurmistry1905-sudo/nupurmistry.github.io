<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        body{
            background-color: hotpink;
            font-family: Arial, Helvetica, sans-serif;
            color: azure;
            text-align: center;
        }
        hr {
            width: 500px;
            height: 2px;
            background-color: lightpink;
            border: 0;
        }
        #game-board{
            width: 450px;
            height: 450px;
            margin: 0 auto;

            background-color: lightpink;
            border: 6px solid mediumvioletred;
            border-radius: 10px;

            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
        }
        .game-cell{
            border: 6px solid mediumvioletred;
            border-radius: 2px;
            font-size: 100px;

            display: flex;
            justify-content: center;
            align-items: center;

        }
        .winning-game-cell{
            background-color: azure;
            color: lightpink;
        }

        #game-restart-button{
            height: 50px;
            width: 150px;
            font-size: 20px;
            margin-top: 20px;
            color: azure;
            background-color: lightpink;
            border: 5px solid deeppink;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <hr>
    <br>
    <div id="game-board">
        <div data-cell-index="0" class="game-cell"></div>
        <div data-cell-index="1" class="game-cell"></div>
        <div data-cell-index="2" class="game-cell"></div>
        <div data-cell-index="3" class="game-cell"></div>
        <div data-cell-index="4" class="game-cell"></div>
        <div data-cell-index="5" class="game-cell"></div>
        <div data-cell-index="6" class="game-cell"></div>
        <div data-cell-index="7" class="game-cell"></div>
        <div data-cell-index="8" class="game-cell"></div>
    </div>
    <button id="game-restart-button">Restart Game</button>
    <script>
        let playerO = "O";
let playerX = "X";
let currPlayer = playerO;

//               0   1   2   3   4   5   6   7   8
let gameBoard = ["", "", "", "", "", "", "", "", ""];
let gameCells;  //array of div cells with indices 0-8

let winningConditions = [
    [0, 1, 2], //horizontal row 1
    [3, 4, 5], //horizontal row 2
    [6, 7, 8], //horizontal row 3
    [0, 3, 6], //vertical column 1
    [1, 4, 7], //vertical column 2
    [2, 5, 8], //vertical column 3
    [0, 4, 8], //diagonal
    [2, 4, 6]  //anti-diagonal
];

let restartGameButton;
let gameOver = false;

window.onload = function() {
    gameCells = document.getElementsByClassName("game-cell");
    for (let cell of gameCells) {
        cell.addEventListener("click", placeCell);
    }
    restartGameButton = this.document.getElementById("game-restart-button");
    restartGameButton.addEventListener("click", restartGame);
}

function placeCell() {
    if (gameOver) {
        return;
    }

    const index = parseInt(this.getAttribute("data-cell-index"));
    if (gameBoard[index] !== "") {
        return;
    }

    gameBoard[index] = currPlayer; //mark the board
    this.innerText = currPlayer;   //mark the board on html    

    //change players
    currPlayer = (currPlayer == playerO) ? playerX : playerO;

    //check winner
    checkWinner();
}

function checkWinner() {
    for (let winCondition of winningConditions) {
        let a = gameBoard[winCondition[0]];
        let b = gameBoard[winCondition[1]];
        let c = gameBoard[winCondition[2]];

        if (a == b && b == c && a != "") {
            //update styling for winning cells
            for (let i = 0; i < gameBoard.length; i++) {
                if (winCondition.includes(i)) {
                    gameCells[i].classList.add("winning-game-cell");
                }
            }
            gameOver = true;
            return;
        }
    }
}

function restartGame() {
    gameOver = false;
    gameBoard = ["", "", "", "", "", "", "", "", ""];
    for (let cell of gameCells) {
        cell.innerText = "";
        cell.classList.remove("winning-game-cell");
    }
}    
    </script>
</body>
</html>
